name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default; jobs opt in to more where needed.
permissions:
  contents: read

jobs:
  test:
    # Linux jobs keep their original "Test (Node X)" names — those are the
    # required status checks in branch protection, and renaming them would leave
    # protection waiting forever on contexts that never report. The macOS job
    # gets an OS-qualified name so it is a distinct (non-required) check.
    name: Test (${{ matrix.os == 'ubuntu-latest' && format('Node {0}', matrix.node) || format('{0}, Node {1}', matrix.os, matrix.node) }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # 22.12 is the floor declared in engines; 24 is Active LTS; 26 is Current.
        node: ['22.12', '24', '26']
        include:
          # A macOS runner exercises the darwin build the Linux jobs never touch:
          # native-module resolution, path handling, the spawned-binary smoke
          # test, and the scrypt/AES file-backed credential store. The OS keyring
          # itself stays out of CI on purpose — the suite sets KITE_DISABLE_KEYRING
          # so a run can never read or write a contributor's real keychain — so
          # this is portability coverage, not keyring coverage. Windows is a
          # tracked follow-up (a few tests still assume POSIX file modes).
          - os: macos-latest
            node: '24'
    steps:
      # Actions are pinned to full commit SHAs, not tags — tags are mutable and
      # a compromised upstream can repoint them (cf. the tj-actions breach).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # --ignore-scripts blocks dependency lifecycle hooks, the vector used by
      # the Shai-Hulud worm. `npm ci` never resolves outside the lockfile.
      - run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
        env:
          # Kite timestamps are IST. A UTC runner would diverge from a laptop
          # and make date assertions flaky.
          TZ: Asia/Kolkata

      - name: Build
        run: npm run build

      - name: Assert the shebang survived the build
        # Silent, total breakage that no unit test catches. `shell: bash` pins the
        # interpreter across every runner OS (Git Bash on Windows) so this POSIX
        # one-liner stays valid as the matrix grows.
        shell: bash
        run: |
          head -1 dist/cli.js | grep -qx '#!/usr/bin/env node' \
            || { echo "dist/cli.js is missing its shebang"; exit 1; }

      - name: Smoke test the built binary
        run: node dist/cli.js --version

  lint:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci --ignore-scripts

      # `biome ci` is read-only: it fails if any file is unformatted or trips a
      # lint rule, without modifying anything. Same command as the pre-commit
      # hook and `npm run lint`, so local and CI never disagree.
      - name: Biome check
        run: npx biome ci

  package:
    name: Package checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm

      # Reads only the lockfile, so it fails fast before install if the
      # production dependency closure has grown past its budget.
      - name: Dependency budget
        run: npm run check:deps

      - run: npm ci --ignore-scripts
      - run: npm run build

      # docs/commands.md is generated from `--help` output, not hand-written —
      # this fails the build if a command or flag changed without also
      # regenerating the checked-in file.
      - name: Command reference is up to date
        run: npm run docs:commands:check

      # publint catches malformed exports/bin fields; attw catches type
      # resolution that breaks for consumers.
      - name: Validate published package shape
        run: npm run lint:publish

      - name: Report install size
        run: npm pack --dry-run

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci --ignore-scripts

      # Verifies registry signatures and provenance attestations for every
      # installed dependency.
      - name: Verify dependency signatures
        run: npm audit signatures

      # A signal, not a gate: advisories land faster than fixes, and failing
      # the build on an unfixable transitive advisory trains people to ignore it.
      - name: Known vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true
