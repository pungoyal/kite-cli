name: Docs

# Builds the VitePress documentation site (docs/) and, on main, deploys it to
# GitHub Pages. The site is an isolated workspace with its own package.json and
# lockfile, so it never touches the CLI package's dependency closure.
#
# On pull requests the build runs as a validation gate only — `vitepress build`
# fails on a broken build or a dead internal link (ignoreDeadLinks is off), so
# regressions are caught before merge. The Pages upload/deploy steps run only on
# a push to main, where the deployment context and permissions exist.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege by default; the deploy job opts into what Pages needs.
permissions:
  contents: read

# Serialise real deployments (one Pages group per ref) without letting a PR
# build block main's deploy or vice versa.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs, not tags — tags are mutable and
      # a compromised upstream can repoint them (cf. the tj-actions breach).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          # VitePress' lastUpdated timestamps read git history, not the tree.
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      # --ignore-scripts blocks dependency lifecycle hooks, the vector used by
      # the Shai-Hulud worm. `npm ci` never resolves outside the lockfile.
      - name: Install docs dependencies
        run: npm ci --ignore-scripts
        working-directory: docs

      # The validation gate: fails the check on a broken build or dead link,
      # on pull requests as well as on main.
      - name: Build
        run: npm run build
        working-directory: docs

      # Pages plumbing is only meaningful on a real deployment, so skip it on
      # pull requests (which also lack the Pages context/permissions).
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        if: github.event_name != 'pull_request'
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to Pages
    # No deploy on pull requests — the build job above is the PR gate.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to Pages
      id-token: write # OIDC token the deploy action verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
